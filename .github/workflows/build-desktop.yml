# 桌面应用云端打包：macOS(universal) + Windows 安装包
# 触发方式：手动(workflow_dispatch) 或推送 v* tag。
# 产物：作为 workflow artifacts 上传；推送 tag 时额外创建 GitHub Release。
name: Build Desktop Apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

# tauri 项目相对仓库根的子目录（本仓库以 cursor-chat-manager 为根）
env:
  PROJECT_PATH: tauri

jobs:
  build:
    permissions:
      contents: write # 创建 Release 需要
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            # macOS 一次产出 Intel + Apple Silicon 通用包
            args: "--target universal-apple-darwin"
            rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
            rust_targets: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ${{ env.PROJECT_PATH }}/pnpm-lock.yaml

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: 缓存 Rust 构建
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.PROJECT_PATH }}/src-tauri

      - name: 安装前端依赖
        working-directory: ${{ env.PROJECT_PATH }}
        run: pnpm install --frozen-lockfile

      - name: 构建并打包(Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ${{ env.PROJECT_PATH }}
          args: ${{ matrix.args }}
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('Cursor Chat Manager {0}', github.ref_name) || '' }}
          releaseDraft: true
          prerelease: false

      - name: 上传安装包 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cursor-chat-manager-${{ matrix.platform }}
          if-no-files-found: ignore
          path: |
            ${{ env.PROJECT_PATH }}/src-tauri/target/**/release/bundle/dmg/*.dmg
            ${{ env.PROJECT_PATH }}/src-tauri/target/**/release/bundle/macos/*.app
            ${{ env.PROJECT_PATH }}/src-tauri/target/release/bundle/msi/*.msi
            ${{ env.PROJECT_PATH }}/src-tauri/target/release/bundle/nsis/*.exe
