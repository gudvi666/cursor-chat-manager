<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cursor Chat Manager</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header id="topbar">
    <div class="brand">Cursor Chat Manager</div>
    <div id="dbinfo" class="dbinfo">加载中…</div>
    <input id="global-search" type="search" placeholder="全文搜索消息内容…(回车)" />
    <div class="actions">
      <button id="btn-stats">统计</button>
      <button id="btn-cleanup" title="清理未被任何对话引用的 agentKv 缓存">清理缓存</button>
      <button id="btn-scan" title="扫描每个对话占用的空间(较慢)">扫描体积</button>
      <button id="btn-backup">备份整库</button>
      <button id="btn-vacuum" title="回收已删除占用的磁盘空间">VACUUM 回收</button>
    </div>
  </header>

  <div id="running-banner" class="banner hidden">
    Cursor 正在运行 —— 当前为<strong>只读模式</strong>，删除与回收已禁用。要清理请先完全退出 Cursor。
  </div>

  <main id="layout">
    <aside id="sidebar">
      <div class="sidebar-tools">
        <input id="search" type="search" placeholder="搜索对话标题…" />
        <select id="sort">
          <option value="updated">按最近更新</option>
          <option value="created">按创建时间</option>
          <option value="size">按体积(需先扫描)</option>
          <option value="name">按标题</option>
        </select>
      </div>
      <div class="sidebar-tools">
        <select id="filter" title="按对话内容筛选；识别空对话需先扫描体积">
          <option value="all">内容: 全部</option>
          <option value="empty">仅空对话 (0 条消息)</option>
          <option value="nonempty">仅有内容</option>
        </select>
        <span id="match-count" class="muted"></span>
      </div>
      <div class="bulkbar">
        <label><input type="checkbox" id="select-all" /> 全选</label>
        <span id="sel-count">已选 0</span>
        <label title="删除后自动 VACUUM 回收磁盘空间（较慢）"><input type="checkbox" id="auto-vacuum" checked /> 删后回收</label>
        <button id="btn-delete" class="danger" disabled>删除所选</button>
      </div>
      <ul id="conv-list"></ul>
    </aside>

    <section id="content">
      <div id="empty" class="empty">← 从左侧选择一个对话查看</div>
      <div id="conversation" class="hidden">
        <div id="conv-header"></div>
        <div id="bubbles"></div>
      </div>
      <div id="search-results" class="hidden panel"></div>
      <div id="stats" class="hidden panel"></div>
      <div id="cleanup" class="hidden panel"></div>
    </section>
  </main>

  <div id="toast" class="toast hidden"></div>

  <script src="/static/app.js"></script>
</body>
</html>
